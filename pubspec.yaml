name: life_tracker
description: "Personal habit tracker, task manager, and life planner."
publish_to: 'none'
version: 1.6.0+9

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # --- State management ---
  # Riverpod: lets widgets "watch" data and rebuild automatically when it changes.
  flutter_riverpod: ^2.6.1
  # The @riverpod annotation we write on our own code (used at compile time).
  riverpod_annotation: ^2.6.1

  # --- Navigation ---
  # go_router: maps URL-like paths (/habits, /habits/add) to screens,
  # and supports a persistent bottom-nav "shell" around groups of routes.
  go_router: ^14.6.3

  # --- Local database ---
  # drift: a type-safe wrapper around SQLite. We define tables in Dart;
  # it generates all the SQL so we never write raw query strings.
  drift: ^2.22.1
  # Bundles the actual SQLite binary for Android (required by drift).
  sqlite3_flutter_libs: ^0.5.28
  # Finds the correct on-device folder to store the database file.
  path_provider: ^2.1.5
  # Utility for joining file paths (e.g. "documents/life_tracker.db").
  path: ^1.9.1

  # --- Data classes ---
  # The @freezed annotation we write on our model classes (runtime half).
  # freezed generates copyWith(), ==, hashCode â€” making models immutable.
  freezed_annotation: ^2.4.4

  # --- Preferences ---
  # shared_preferences: key-value store for small persistent settings
  # (theme mode, visible tabs). Data survives app restarts.
  shared_preferences: ^2.3.3

  # --- Notifications ---
  # Schedules and displays local (device-only) notifications.
  # No server needed â€” everything runs on-device.
  flutter_local_notifications: ^19.0.0
  # Required by flutter_local_notifications for timezone-aware scheduling
  # (so "9 AM" means 9 AM in the user's local timezone, not UTC).
  timezone: ^0.10.0
  # Runs a Dart callback at an exact time, even in the background. Used to fire
  # scheduled reminders reliably on Samsung (where flutter_local_notifications'
  # own scheduling silently fails) â€” the callback shows an immediate
  # notification, which works.
  android_alarm_manager_plus: ^4.0.0

  # --- Utilities ---
  # Date formatting â€” turns DateTime into readable strings like "2026-05-26".
  intl: ^0.19.0

  # --- Backup (export / import) ---
  # share_plus: hands the exported JSON file to the system share sheet so the
  # user can save it to Google Drive, email it, etc.
  share_plus: ^10.1.2
  # file_selector: lets the user choose a backup .json file when importing.
  # (Flutter-team plugin â€” avoids file_picker's transitive Android SDK clashes.)
  file_selector: ^1.0.3

  # --- Home-screen widget ---
  # home_widget: bridges Flutter and the native Android home-screen widget.
  # Flutter saves small values; the native AppWidgetProvider displays them.
  home_widget: ^0.7.0

  # --- Field-test readiness (diagnostics + updates) ---
  # http: calls the GitHub Releases API to check for a newer APK.
  http: ^1.2.2
  # package_info_plus: reads the app's version at runtime (drawer, diagnostics,
  # update comparison) instead of hardcoding it.
  package_info_plus: ^8.1.2
  # device_info_plus: device model + Android version for the diagnostics report.
  device_info_plus: ^11.2.0
  # url_launcher: opens the release APK download link in the browser.
  url_launcher: ^6.3.1
  flutter_secure_storage: ^10.3.1

  # --- Notes (photo attachments) ---
  # image_picker: pick a photo from the camera or gallery. Bytes are copied
  # into <appDocs>/note_images/ by ImageStorageService; only the filename is
  # stored in the DB (see lib/core/images/).
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Runs all code generators in one pass (drift, riverpod, freezed).
  build_runner: ^2.4.13
  # Generates the xxxProvider variable from our @riverpod-annotated code.
  riverpod_generator: ^2.6.3
  # Generates the immutable data class body from our @freezed-annotated code.
  freezed: ^2.5.7
  # drift's generator plugin â€” must match the drift runtime version above.
  drift_dev: ^2.22.1

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
